spring:
  application:
    name: devpulse

  # Java 25 virtual threads везде, где Spring их поддерживает (MVC, Async, Scheduling)
  threads:
    virtual:
      enabled: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/devanalytics}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  cache:
    type: caffeine
    cache-names:
      - kaiten-cards-by-member
    # TTL для Kaiten cards. Кэш защищает /profile от: refresh страницы, повторных
    # открытий тем же пользователем, нагрузки от 50+ одновременных сессий.
    # 5 минут — компромисс: достаточно свежо для рабочего workflow, экономит большую
    # долю Kaiten round-trip'ов.
    caffeine:
      spec: ${KAITEN_CACHE_SPEC:expireAfterWrite=5m,maximumSize=1000}

  liquibase:
    enabled: true
    change-log: classpath:/liquibase/changelog.master.yml
    # Явно фиксируем каталог/схему — обходит баг "Found multiple catalogs matching ..."
    # когда JDBC DatabaseMetaData.getCatalogs() возвращает дубли (прокси / setup-specific).
    default-schema: public
    liquibase-schema: public

# === Git collection ===
# repositories и token — задаются через env-переменные / профиль application-local.yml.
# В этом файле НИКОГДА не должно быть реальных токенов или внутренних URL'ов:
# он коммитится в репо. См. application-local.yml.example для локального профиля.
git:
  repositories: ${GIT_REPOSITORIES:}
  token: ${GIT_TOKEN:}
  cache-directory: ${GIT_CACHE_DIR:${user.home}/Documents/git-cache/}
  # Timeout на одну git-команду (clone/fetch/log). Защита от зависших процессов:
  # без неё DNS lookup / hung HTTP proxy / broken pipe могли бы подвесить сборщик навсегда.
  command-timeout: ${GIT_COMMAND_TIMEOUT:30m}

# === Kaiten integration ===
kaiten:
  api:
    # API endpoint — для HTTP-клиента (см. KaitenHttpClient @HttpExchange).
    url: ${KAITEN_URL:}
    # Web-UI host — для построения ссылки на карточку в /profile.cards[].url.
    # Если не задан, KaitenCard.url = null (фронт просто не покажет ссылку).
    web-base-url: ${KAITEN_WEB_BASE_URL:}
    token: ${KAITEN_TOKEN:}
    request-delay-ms: 250         # ≈4 RPS, safe for sliding-window limit
    max-retries: 10
    retry-initial-backoff-ms: 5000
    retry-max-backoff-ms: 60000
    # Как часто рефрешить name/avatar уже привязанных unified_user из Kaiten
    # (порог по lastSyncedAt). Свежие в пределах интервала API не дёргают.
    # Формат java.time.Duration (3d / 12h / 30m). Default: 3d.
    user-refresh-interval: ${KAITEN_USER_REFRESH_INTERVAL:3d}
    # ВНИМАНИЕ: только для локальной разработки на машинах без корпоративного X5 CA
    # в truststore. Отключает проверку SSL-сертификата для Kaiten.
    # Default: false. В local профиле можно включить через KAITEN_INSECURE_SSL=true.
    insecure-ssl: ${KAITEN_INSECURE_SSL:false}

# === GitLab integration (ревью-метрики: MR / approvals / notes) ===
gitlab:
  api:
    # Базовый URL GitLab API v4. Дефолт — тот же scm, что и git-репозитории.
    base-url: ${GITLAB_API_URL:https://scm.x5.ru/api/v4}
    # PAT с правами read_api/read_user. По умолчанию — тот же токен, что git.token
    # (ссылка на property git.token, не на env GIT_TOKEN — чтобы подхватывался и из
    # application-local.yml, где токен задаётся как git.token: ...). Переопределить —
    # env GITLAB_TOKEN или явным gitlab.api.token.
    token: ${GITLAB_TOKEN:${git.token:}}
    # Проекты для сбора. Если пусто — деривятся из git.repositories (clone-URL → namespace/repo).
    projects: ${GITLAB_PROJECTS:}
    # Домен для резолва username→email.
    email-domain: ${GITLAB_EMAIL_DOMAIN:x5.ru}
    # Тянуть ли GET /users ради public_email. По умолчанию false: пагинация по ВСЕМ юзерам
    # GitLab дорогая (минуты на прогон), а username@домен для scm.x5.ru совпадает с email.
    # Включай только если у части людей username ≠ local-part email.
    fetch-public-emails: ${GITLAB_FETCH_PUBLIC_EMAILS:false}
    # Глубина бэкфилла назад от now (дней). 0 = без ограничения (вся история от since прогона).
    # Поставь > 0, только если нужно искусственно ограничить первый прогон.
    max-backfill-days: ${GITLAB_MAX_BACKFILL_DAYS:0}
    # Сколько MR обрабатывать параллельно (approvals+notes на virtual threads). Главный рычаг
    # скорости: per-MR вызовы — узкое место. Подними, если scm.x5.ru держит больше RPS.
    concurrency: ${GITLAB_CONCURRENCY:8}
    request-delay-ms: 200
    max-retries: 5
    retry-backoff-ms: 2000
    page-size: 100
    # scm.x5.ru за внутренним X5 CA — как и Kaiten, в dev можно отключить проверку SSL.
    insecure-ssl: ${GITLAB_INSECURE_SSL:false}

# === Scoring (дашборд: активность разработчиков) ===
scoring:
  # Baseline: ожидаемое количество не-мердж коммитов за 30 дней — норма команды (score = 1.0).
  # Для других периодов масштабируется линейно (за 15 дней ожидание = 25, и т.д.).
  expected-commits-per-30-days: ${SCORING_EXPECTED_COMMITS_PER_30D:50}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
