databaseChangeLog:
  - changeSet:
      id: 004-create-last-export-tracker
      author: boris.osechinskiy
      changes:
        - createTable:
            tableName: last_export_tracker
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: export_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: last_export_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_export_date
                  type: DATE
              - column:
                  name: status
                  type: VARCHAR(20)
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - createIndex:
            indexName: idx_export_type
            tableName: last_export_tracker
            columns:
              - column:
                  name: export_type