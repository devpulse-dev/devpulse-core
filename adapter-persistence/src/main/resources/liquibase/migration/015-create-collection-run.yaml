databaseChangeLog:
  - changeSet:
      id: 015-create-collection-run
      author: boris.osechinskiy
      changes:
        - createTable:
            tableName: collection_run
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: started_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: finished_at
                  type: TIMESTAMP
              - column:
                  name: since_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: until_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: VARCHAR(2000)

        - createIndex:
            indexName: idx_collection_run_status_until
            tableName: collection_run
            columns:
              - column:
                  name: status
              - column:
                  name: until_date
                  descending: true
