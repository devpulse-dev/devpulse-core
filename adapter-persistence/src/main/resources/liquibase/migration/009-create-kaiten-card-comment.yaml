databaseChangeLog:
  - changeSet:
      id: 009-create-kaiten-card-comment
      author: boris.osechinskiy
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: kaiten_card_comment
      changes:
        - createTable:
            tableName: kaiten_card_comment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: card_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
              - column:
                  name: author_name
                  type: VARCHAR(255)
              - column:
                  name: text
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - createIndex:
            indexName: idx_kaiten_comment_card
            tableName: kaiten_card_comment
            columns:
              - column:
                  name: card_id
        - createIndex:
            indexName: idx_kaiten_comment_author
            tableName: kaiten_card_comment
            columns:
              - column:
                  name: author_id