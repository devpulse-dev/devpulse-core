databaseChangeLog:
  - changeSet:
      id: 004-create-daily-author-stats
      author: boris.osechinskiy
      changes:
        - createTable:
            tableName: daily_author_stats
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: merge_commits
                  type: BIGINT
              - column:
                  name: commits
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: added_lines
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: deleted_lines
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: test_added_lines
                  type: BIGINT
              - column:
                  name: last_updated
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            constraintName: uk_daily_stats_email_date
            tableName: daily_author_stats
            columnNames: email, date

        - createIndex:
            indexName: idx_daily_stats_date
            tableName: daily_author_stats
            columns:
              - column:
                  name: date

        - createIndex:
            indexName: idx_daily_stats_email
            tableName: daily_author_stats
            columns:
              - column:
                  name: email