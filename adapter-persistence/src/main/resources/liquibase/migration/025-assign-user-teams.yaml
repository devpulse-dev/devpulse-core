# Проставление команд пользователям по орг-структуре (Фаза 1 perf-review).
#
# Матчинг людей из орг-структуры с unified_user — по email (стабильный уникальный ключ;
# заодно отсекает placeholder/дубль-строки). В каждую команду входят DEV-лид + разработчики.
#
# ПРИМЕЧАНИЯ:
#  - Delivery-лиды (Оленьков, Володина, Круглов, Гайдай, Ситник, Шестаков) в unified_user
#    отсутствуют (нет git/kaiten-активности) — не назначаются.
#  - «Кузнецова Анжелика» из структуры смэтчена на единственную Анжелику в БД —
#    anzh.feoktistova@x5.ru (Anzhelika Feoktistova). Вероятная смена фамилии; если это не она —
#    поправить отдельной миграцией.
databaseChangeLog:
  - changeSet:
      id: 025-assign-user-teams
      author: boris.osechinskiy
      changes:
