name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Не гоняем параллельно одну и ту же ref: при пуше нового коммита отменяем старый прогон.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_ARGS: "-B -ntp -Dstyle.color=always"

jobs:
  # --------------------------------------------------------------------------
  # 1. Compile — быстрая проверка что код собирается.
  # --------------------------------------------------------------------------
  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # setup-java генерирует ~/.m2/settings.xml с server-id=github,
      # username/password из env MAVEN_USERNAME/MAVEN_PASSWORD. Это нужно для
      # resolve dependencies из GitHub Packages (devpulse-oas contract JARs).
      # server-id ОБЯЗАН совпадать с <id>github</id> в adapter-rest/pom.xml.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Compile (no tests)
        run: mvn $MAVEN_ARGS -DskipTests package
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # 2. Unit tests — все *Test классы (Surefire). Без Docker, быстро.
  #    Включает: domain, application (use case Mockito), adapter-* unit,
  #    ArchUnit-тесты гексагона, MockMvc-тесты adapter-rest.
  # --------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Run unit tests
        run: mvn $MAVEN_ARGS test
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          retention-days: 7

  # --------------------------------------------------------------------------
  # 3. Integration tests — *IT классы (Failsafe).
  #    Поднимает Postgres-контейнеры (Testcontainers) и smoke поднимает
  #    весь Spring-контекст. Docker уже доступен на ubuntu-latest runner.
  # --------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Ryuk (контейнер-уборщик Testcontainers) на GitHub-hosted runner иногда мешает
      # запуску основного Postgres. JVM shutdown hook сам убирает контейнеры — Ryuk не нужен.
      TESTCONTAINERS_RYUK_DISABLED: "true"
      # Disable startup check that probes Docker socket — лишняя задержка на CI.
      TESTCONTAINERS_CHECKS_DISABLE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      # Surefire фазу пропускаем — она в отдельной джобе. Гоняем только Failsafe.
      - name: Run integration tests
        run: mvn $MAVEN_ARGS verify -Dsurefire.skip=true
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload failsafe reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: '**/target/failsafe-reports/**'
          retention-days: 7
